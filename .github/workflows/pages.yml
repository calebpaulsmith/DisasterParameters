name: Deploy to GitHub Pages

on:
  # Run on every push to the default branch
  push:
    branches: [main]
  # Allow manual runs from the Actions tab
  workflow_dispatch:

# Permissions the GITHUB_TOKEN needs to publish Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress one
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Turns Pages on automatically (enablement: true) so no manual
      # Settings toggle is required on first run.
      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      # Refresh the national briefing ledger + the "latest obligations" strips
      # from OpenFEMA at deploy time. Order matters: build_newsreel reads the
      # COVID dn set from briefing.json. Network-only + fast; if OpenFEMA is
      # unreachable, keep the committed snapshots so a hiccup never breaks
      # the deploy.
      - name: Refresh briefing ledger (best-effort)
        run: |
          python3 scripts/build_briefing.py \
            || echo "briefing refresh failed — keeping committed data/briefing.json"
      - name: Refresh newsreel (best-effort)
        run: |
          python3 scripts/build_newsreel.py \
            || echo "newsreel refresh failed — keeping committed data/newsreel.json"

      # Refresh the Geography "Recent activity" baked fallback (1-yr window + live
      # fallback). The live short windows (7–90d) fetch from OpenFEMA in-browser;
      # this only keeps the committed snapshot current. A Cloudflare worker
      # (cloudflare/) can refresh the same payload daily between deploys.
      - name: Refresh recent obligations (best-effort)
        run: |
          python3 scripts/build_county_recent.py \
            || echo "recent refresh failed — keeping committed data/recent.json"

      # Stamp the deployed commit + date into the page footer
      - name: Stamp build info
        run: |
          SHORT=$(git rev-parse --short HEAD)
          DATE=$(date -u +"%Y-%m-%d %H:%MZ")
          sed -i "s/__BUILD_SHA__/${SHORT}/g; s/__BUILD_DATE__/${DATE}/g" index.html
          echo "stamped build ${SHORT} (${DATE})"

      # Publish the repository root (index.html is the whole app)
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
