name: Deploy to GitHub Pages

on:
  # Run on every push to the default branch
  push:
    branches: [main]
  # Allow manual runs from the Actions tab
  workflow_dispatch:

# Permissions the GITHUB_TOKEN needs to publish Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress one
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Turns Pages on automatically (enablement: true) so no manual
      # Settings toggle is required on first run.
      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      # Publish the repository root (index.html is the whole app)
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
