name: Refresh request dates (weekly)

# Rebuilds data/request_dates.json — request dates for DECLARED Region 5 disasters,
# harvested from the FEMA Daily Operations Briefing archive and matched conservatively
# to OpenFEMA declarations (with a built-in cross-check against OpenFEMA denial
# request dates). WEEKLY, not daily: a harvested request date only changes the file
# when a pending request gets DECIDED and matches a new declaration — which happens on
# the order of weeks, not days (the daily pending.json refresh handles the fast-moving
# "in process" list). See scripts/build_request_dates.py.
#
# The brief archive is ~1,300 PDFs, so we persist the resumable parse cache
# (data/_request_cache.json) via actions/cache: a warm run only fetches the new briefs
# since last week (~1 min); a cold run re-harvests the lot (~7 min). Either way the
# commit is gated on change. ROLLBACK: delete this workflow + request_dates.json.

on:
  schedule:
    - cron: "43 15 * * 1"   # Mondays 15:43 UTC
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: refresh-request-dates
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install PDF parser
        run: pip install pdfplumber

      # Persist the brief parse cache across weekly runs so only new briefs are fetched.
      # A changing key + restore-keys prefix means each run restores the latest cache and
      # saves an updated one (the cache is not committed — it's a regenerable intermediate).
      - name: Restore brief parse cache
        uses: actions/cache@v4
        with:
          path: data/_request_cache.json
          key: reqcache-${{ github.run_id }}
          restore-keys: reqcache-

      - name: Harvest + match request dates
        run: python3 scripts/build_request_dates.py || echo "request-dates refresh failed (fetch/network) — keeping committed snapshot"

      # Re-verify the data web after the refresh (Guardian) — catches a refresh that
      # ever added/removed a data file before it commits. See docs/lineage-plan.md §6.
      - name: Verify lineage (Guardian)
        run: python3 scripts/verify_lineage.py

      - name: Commit on change
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/request_dates.json
          if git diff --cached --quiet; then
            echo "No request-date changes this week — nothing to commit."
          else
            git commit -m "Refresh request dates (FEMA Daily Ops Brief harvest)"
            git push origin main
            echo "Pushed refreshed request_dates.json — pages.yml will redeploy."
          fi
