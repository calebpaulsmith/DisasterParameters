name: Refresh pending declarations

# Re-parses the "Declaration Requests in Process" table from the latest FEMA Daily
# Operations Briefing and commits data/pending.json to main when it changes (which
# triggers pages.yml to redeploy). This is the ONE data source that is not OpenFEMA —
# it parses the daily briefing PDF, sourced via the Data Liberation Project's archive.
#
# TIMING: the briefing is published ~8:30 a.m. ET. The Data Liberation Project ingests
# it mid-morning ET (observed govdelivery-link commits ~13:00–16:00 UTC). We run at
# 14:23 UTC (just after the typical ingest) with a 16:23 UTC fallback. The build is
# idempotent: if today's brief is already captured, pending.json is unchanged and the
# "commit on change" step is a no-op, so the double run never double-commits.
#
# TRUST GATE: build_pending.py asserts parsed rows == the briefing header count
# ("Declaration Requests in Process – N") and EXITS NONZERO WITHOUT WRITING on a
# mismatch — so a FEMA layout change that breaks the parser keeps the last good
# snapshot instead of shipping garbage. ROLLBACK: delete this workflow + the two
# pending files; nothing else depends on them.

on:
  schedule:
    - cron: "23 14 * * *"   # 14:23 UTC — just after DLP's typical ingest
    - cron: "23 16 * * *"   # 16:23 UTC — fallback if the morning run was too early
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: refresh-pending
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install PDF parser
        run: pip install pdfplumber

      # Best-effort: a fetch hiccup or a cross-check mismatch keeps the committed
      # snapshot (the script exits nonzero WITHOUT writing on mismatch) rather than
      # failing the run or overwriting good data with bad.
      - name: Parse latest Daily Ops Briefing
        run: python3 scripts/build_pending.py || echo "pending refresh skipped (no new brief, fetch error, or cross-check mismatch) — keeping committed snapshot"

      - name: Commit on change
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/pending.json
          if git diff --cached --quiet; then
            echo "No pending-declaration changes — nothing to commit."
          else
            git commit -m "Refresh pending declarations (FEMA Daily Ops Brief)"
            git push origin main
            echo "Pushed refreshed pending.json — pages.yml will redeploy."
          fi
